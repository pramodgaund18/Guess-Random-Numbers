<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
       
       *{
        background-color: white;

        }
        
        body {
            font-family: sans-serif;
            width:100%;
            max-width: 800px;
            min-width: 480px;
            margin:0 auto;
            border: 2px solid black;
        }
        h1{
            color: rebeccapurple;
            font-weight: bold;
        }
        p{
            color: burlywood;
            font-weight: bold;
        }
        label{
            color: blue;
        }
        input{
            color: red;
        }

    </style>

</head>
<body>
    <h1> Guess The Number</h1>
    <p> We have selected a random number between 1-20. see  if you can guess it.</p>
    <div class="form">
        <label for="guessField">Enter a guess:</label>
        <input type="text" id="guessField" class="guessField">
        <input type="submit" value="Guess" id="submitguess">
    </div>



    <script type="text/javascript">

        let y=Math.floor(Math.random()*10+1);
        let guess=5;

        document.getElementById("submitguess").onclick=function()
        {
            let x= document.getElementById("guessField").value;
            if(x==y)
        {
            alert("Woooooow, aapne guess kar liya!!! you are genious " +guess + "guess");
        }
        else if (x>y)
        {
            guess++;
            alert("Ohhh, fir se try karo!!! you can do it");
        }
        else {
            guess++;
            alert("Ooh, ak baar fir karo!!! may be guess ho jaye");

        }
        }


    </script>
    
</body>
</html>
